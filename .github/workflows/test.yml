name: Test

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test-linux:
    name: Linux Tests
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v5

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build \
            libfreetype6-dev libpcre2-dev \
            libx11-dev libxext-dev libxcursor-dev libxinerama-dev \
            libxi-dev libxrandr-dev libxss-dev libxtst-dev \
            libxxf86vm-dev libxfixes-dev libxrender-dev \
            libdbus-1-dev libudev-dev \
            libpulse-dev libasound2-dev \
            libdrm-dev libgbm-dev \
            libegl1-mesa-dev libgles2-mesa-dev \
            libwayland-dev libxkbcommon-dev wayland-protocols
          git clone --depth 1 --branch release-3.4.2 https://github.com/libsdl-org/SDL.git
          cmake -S SDL -B SDL/build -DCMAKE_BUILD_TYPE=Release -G Ninja
          cmake --build SDL/build
          sudo cmake --install SDL/build

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ github.job }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ github.job }}-

      - name: Run tests
        run: cargo test --all-features

  test-windows:
    name: Windows Tests
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/cache@v5
        with:
          path: C:\vcpkg\installed
          key: vcpkg-x64-windows-sdl3-freetype-pcre2-v1

      - name: Install system dependencies
        run: |
          choco install pkgconfiglite -y
          $maxRetries = 3
          for ($i = 1; $i -le $maxRetries; $i++) {
            vcpkg install sdl3:x64-windows freetype:x64-windows pcre2:x64-windows
            if ($LASTEXITCODE -eq 0) { break }
            if ($i -lt $maxRetries) {
              Write-Host "vcpkg install attempt $i failed, retrying in 15s..."
              Start-Sleep -Seconds 15
            } else {
              throw "vcpkg install failed after $maxRetries attempts"
            }
          }
          echo "VCPKG_ROOT=C:\vcpkg" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          echo "PKG_CONFIG_PATH=C:\vcpkg\installed\x64-windows\lib\pkgconfig" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          # Key the build cache on the static-CRT toolchain config so a target/
          # built against a different MSVC runtime is not restored; the -crt2-
          # token keeps the loose restore-keys fallback on the same runtime too.
          key: ${{ runner.os }}-${{ github.job }}-crt2-${{ hashFiles('**/Cargo.lock', '.cargo/config.toml', 'cmake/static-crt.cmake') }}
          restore-keys: |
            ${{ runner.os }}-${{ github.job }}-crt2-

      - name: Run tests
        shell: pwsh
        run: |
          # Put vcpkg's x64-windows bin dir on PATH so the test binary can
          # load SDL3.dll / freetype.dll / pcre2*.dll at runtime.
          $env:PATH = "C:\vcpkg\installed\x64-windows\bin;$env:PATH"
          cargo test --all-features

  test-macos:
    name: macOS Tests
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install system dependencies
        run: brew install sdl3 freetype pcre2

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ github.job }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ github.job }}-

      - name: Run tests
        run: cargo test --all-features
