name: Build Release Binaries

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-linux:
    name: Linux x86_64
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v5

      - name: Read app version
        shell: bash
        run: |
          APP_VERSION="$(awk -F'"' '
            /^\[workspace\.package\]$/ { in_section = 1; next }
            /^\[/ { in_section = 0 }
            in_section && $1 ~ /^version = / { print $2; exit }
          ' Cargo.toml)"
          echo "APP_VERSION=$APP_VERSION" >> "$GITHUB_ENV"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build \
            libx11-dev libxext-dev libxcursor-dev libxinerama-dev \
            libxi-dev libxrandr-dev libxss-dev libxtst-dev \
            libxxf86vm-dev libxfixes-dev libxrender-dev \
            libdbus-1-dev libudev-dev \
            libpulse-dev libasound2-dev \
            libdrm-dev libgbm-dev \
            libegl1-mesa-dev libgles2-mesa-dev \
            libwayland-dev libxkbcommon-dev wayland-protocols
          # freetype and pcre2 are now built from vendored source and
          # statically linked (see .cargo/config.toml), so libfreetype6-dev
          # and libpcre2-dev are no longer required. SDL3 is likewise built
          # by sdl3-sys during `cargo build`. The X11 / Wayland dev headers
          # stay because SDL3's cmake build needs them at compile time.

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ github.job }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ github.job }}-

      - name: Build
        run: cargo build --release --workspace

      - name: Package tarball
        run: |
          ARCHIVE_BASE="lite-anvil-${APP_VERSION}-linux-x86_64"
          mkdir "$ARCHIVE_BASE"
          cp target/release/lite-anvil "$ARCHIVE_BASE/"
          cp target/release/nano-anvil "$ARCHIVE_BASE/"
          cp target/release/note-anvil "$ARCHIVE_BASE/"
          cp -r data "$ARCHIVE_BASE/"
          # SDL3 is statically linked into the binaries — no libSDL3.so
          # to ship, no lib/ directory to create, no RPATH to manage.
          cp resources/linux/com.lite_anvil.LiteAnvil.desktop "$ARCHIVE_BASE/"
          cp resources/linux/com.nano_anvil.NanoAnvil.desktop "$ARCHIVE_BASE/"
          cp resources/linux/com.note_anvil.NoteAnvil.desktop "$ARCHIVE_BASE/"
          cp resources/icons/lite-anvil.png "$ARCHIVE_BASE/"
          cp resources/icons/nano-anvil.png "$ARCHIVE_BASE/"
          cp resources/icons/note-anvil.png "$ARCHIVE_BASE/"
          tar -czf "${ARCHIVE_BASE}.tar.gz" "$ARCHIVE_BASE"

      - name: Install packaging tools
        run: cargo install --locked cargo-deb cargo-generate-rpm

      - name: Build .deb package
        run: |
          cargo deb --no-build -p lite-anvil
          mv target/debian/*.deb .

      - name: Build .rpm package
        run: |
          cargo generate-rpm -p lite-anvil
          mv target/generate-rpm/*.rpm .

      - name: Build AppImages
        run: |
          set -euo pipefail
          curl -L -o appimagetool https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x appimagetool

          # Core glibc / loader libraries must match the host kernel and
          # ABI, so they stay unbundled. Everything else the binary links
          # against (libpcre2-8, libgcc_s, and any transitive SDL /
          # freetype deps that survived static linking) gets copied into
          # $APPDIR/usr/lib so the AppImage runs on distros that don't
          # happen to have those libraries — Alpine via gcompat, NixOS
          # via appimage-run, and mainline distros that have migrated
          # libpcre2 past soname 0.
          is_system_lib() {
              case "$(basename "$1")" in
                  ld-linux-*.so.*|libc.so.*|libm.so.*|libdl.so.*|\
                  libpthread.so.*|librt.so.*|libresolv.so.*|libnsl.so.*|\
                  libutil.so.*|libcrypt.so.*|libBrokenLocale.so.*|\
                  libanl.so.*|libmemusage.so.*|libmvec.so.*|\
                  libnss_*.so.*|libthread_db.so.*)
                      return 0 ;;
                  *)
                      return 1 ;;
              esac
          }

          bundle_deps() {
              local root_binary="$1" libdir="$2"
              mkdir -p "$libdir"
              local pending=("$root_binary")
              while [ ${#pending[@]} -gt 0 ]; do
                  local target="${pending[0]}"
                  pending=("${pending[@]:1}")
                  while IFS= read -r lib; do
                      is_system_lib "$lib" && continue
                      local dest="$libdir/$(basename "$lib")"
                      [ -f "$dest" ] && continue
                      cp -Lf "$lib" "$dest"
                      chmod 755 "$dest"
                      pending+=("$dest")
                  done < <(ldd "$target" 2>/dev/null \
                           | awk '$2 == "=>" && $3 ~ /^\// { print $3 }')
              done
          }

          build_appimage() {
              local app="$1"
              local data_src="$2"
              local display="$3"
              local desktop_src="resources/linux/com.${app//-/_}.${display//-/}.desktop"

              local dir="${app}.AppDir"
              rm -rf "$dir"
              mkdir -p "$dir/usr/bin" "$dir/usr/lib" \
                       "$dir/usr/share/applications" \
                       "$dir/usr/share/icons/hicolor/256x256/apps" \
                       "$dir/usr/share/${app}"

              cp "target/release/${app}" "$dir/usr/bin/${app}"
              chmod 755 "$dir/usr/bin/${app}"
              bundle_deps "$dir/usr/bin/${app}" "$dir/usr/lib"
              echo "Bundled libs for ${app}:"
              ls -1 "$dir/usr/lib" || true

              cp -r "$data_src" "$dir/usr/share/${app}/data"
              cp "$desktop_src" "$dir/usr/share/applications/${app}.desktop"
              cp "$desktop_src" "$dir/${app}.desktop"
              cp "resources/icons/${app}.png" "$dir/usr/share/icons/hicolor/256x256/apps/${app}.png"
              cp "resources/icons/${app}.png" "$dir/${app}.png"
              cp "resources/icons/${app}.png" "$dir/.DirIcon"

              sed "s/@APP@/${app}/g" resources/linux/AppRun > "$dir/AppRun"
              chmod 755 "$dir/AppRun"

              APPIMAGE_EXTRACT_AND_RUN=1 ./appimagetool "$dir" "${app}-${APP_VERSION}-x86_64.AppImage"
          }

          build_appimage lite-anvil data Lite-Anvil
          build_appimage nano-anvil data Nano-Anvil
          build_appimage note-anvil data Note-Anvil

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v6
        with:
          name: lite-anvil-linux-x86_64
          path: |
            lite-anvil-*-linux-x86_64.tar.gz
            *.deb
            *.rpm
            *.AppImage

  build-windows:
    name: Windows x86_64
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      - name: Read app version
        shell: bash
        run: |
          APP_VERSION="$(awk -F'"' '
            /^\[workspace\.package\]$/ { in_section = 1; next }
            /^\[/ { in_section = 0 }
            in_section && $1 ~ /^version = / { print $2; exit }
          ' Cargo.toml)"
          echo "APP_VERSION=$APP_VERSION" >> "$GITHUB_ENV"

      - uses: actions/cache@v5
        with:
          path: C:\vcpkg\installed
          key: vcpkg-x64-windows-freetype-pcre2-v2

      - name: Install system dependencies
        run: |
          # No vcpkg / pkg-config needed any more: SDL3, freetype, and
          # pcre2 are all built from vendored source by their -sys crates
          # during `cargo build` and statically linked in. MSVC + cmake
          # ship with the windows-latest runner by default.
          Write-Host "No external libraries to install — all deps are bundled by cargo."

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ github.job }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ github.job }}-

      - name: Build
        env:
          # Force the CMake-based SDL3 build (and any other cmake-rs
          # consumer in the graph) to link against the static MSVC
          # runtime so the final exe has no VCRUNTIME140.dll /
          # MSVCP140.dll import. Rust is already +crt-static via
          # `.cargo/config.toml`; this aligns the C half of the build.
          CMAKE_MSVC_RUNTIME_LIBRARY: MultiThreaded
        run: cargo build --release --workspace

      - name: Stage installer payload
        run: |
          $stage = 'build\lite-anvil'
          New-Item -ItemType Directory -Force -Path $stage | Out-Null
          Copy-Item target\release\lite-anvil.exe "$stage\"
          Copy-Item target\release\nano-anvil.exe "$stage\"
          Copy-Item target\release\note-anvil.exe "$stage\"
          Copy-Item -Recurse data "$stage\"
          Copy-Item resources\windows\*.ps1 "$stage\"

          # Safety net for any transitive cmake-built C dep that still links
          # /MD and would otherwise abort with "VCRUNTIME140.dll was not found".
          $vcRedistPatterns = @(
            'C:\Program Files\Microsoft Visual Studio\2022\*\VC\Redist\MSVC\*\x64\Microsoft.VC*.CRT',
            'C:\Program Files (x86)\Microsoft Visual Studio\2022\*\VC\Redist\MSVC\*\x64\Microsoft.VC*.CRT'
          )
          $vcRedistDir = $null
          foreach ($pattern in $vcRedistPatterns) {
            $match = Get-ChildItem -Path $pattern -Directory -ErrorAction SilentlyContinue |
                     Sort-Object -Property FullName -Descending |
                     Select-Object -First 1
            if ($match) { $vcRedistDir = $match.FullName; break }
          }
          if ($vcRedistDir) {
            Get-ChildItem -Path "$vcRedistDir\*.dll" | ForEach-Object {
              Copy-Item -Path $_.FullName -Destination "$stage\"
            }
          }

      - name: Generate icon.ico
        run: |
          magick resources\icons\lite-anvil.png `
            -define icon:auto-resize=16,32,48,64,128,256 `
            resources\icons\icon.ico

      - name: Build Inno Setup installer
        run: |
          $iss = Get-Content scripts\innosetup\innosetup.iss.in -Raw
          $buildDir  = (Resolve-Path build).Path -replace '\\', '/'
          $sourceDir = $PWD.Path -replace '\\', '/'
          $iss = $iss -replace '@PROJECT_VERSION@',   $env:APP_VERSION
          $iss = $iss -replace '@PROJECT_BUILD_DIR@', $buildDir
          $iss = $iss -replace '@PROJECT_SOURCE_DIR@',$sourceDir
          $iss | Set-Content scripts\innosetup\innosetup.iss -Encoding utf8

          $iscc = 'C:\Program Files (x86)\Inno Setup 6\ISCC.exe'
          if (-not (Test-Path $iscc)) {
            $iscc = 'C:\Program Files\Inno Setup 6\ISCC.exe'
          }
          & $iscc /Qp scripts\innosetup\innosetup.iss
          if ($LASTEXITCODE -ne 0) { throw "ISCC failed with exit $LASTEXITCODE" }

          Move-Item scripts\innosetup\LiteAnvil-*-setup.exe . -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: lite-anvil-windows-x86_64
          path: LiteAnvil-*-setup.exe

  build-macos-intel:
    name: macOS Intel (x86_64)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5

      - name: Read app version
        shell: bash
        run: |
          APP_VERSION="$(awk -F'"' '
            /^\[workspace\.package\]$/ { in_section = 1; next }
            /^\[/ { in_section = 0 }
            in_section && $1 ~ /^version = / { print $2; exit }
          ' Cargo.toml)"
          echo "APP_VERSION=$APP_VERSION" >> "$GITHUB_ENV"

      # SDL3, freetype, and pcre2 are all built from vendored source by
      # their -sys crates during `cargo build` and statically linked.
      # macOS Intel no longer needs any system library bootstrap step.

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin

      - uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ github.job }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ github.job }}-

      - name: Build
        env:
          MACOSX_DEPLOYMENT_TARGET: "12.0"
        run: |
          # ___isPlatformVersionAtLeast lives in libclang_rt.osx.a, which Rust's
          # -nodefaultlibs drops. Find it for the x86_64 slice and pass it directly.
          CLANG_RT=$(clang -arch x86_64 -print-file-name=libclang_rt.osx.a)
          export RUSTFLAGS="-C link-arg=$CLANG_RT \
            -C link-arg=-framework -C link-arg=UniformTypeIdentifiers"
          cargo build --release --workspace --target x86_64-apple-darwin

      - name: Create .app bundle
        run: |
          set -euo pipefail

          macos_list_deps() {
            otool -L "$1" | tail -n +2 | awk '{print $1}'
          }

          macos_should_bundle_dep() {
            case "$1" in
              /System/Library/*|/usr/lib/*|@executable_path/*|@loader_path/*)
                return 1
                ;;
              /*|@rpath/*)
                return 0
                ;;
              *)
                return 1
                ;;
            esac
          }

          macos_resolve_dep() {
            local dep="$1"
            local dep_name candidate
            local matches=()

            if [ -f "$dep" ]; then
              printf '%s\n' "$dep"
              return 0
            fi

            dep_name="$(basename "$dep")"

            shopt -s nullglob
            for candidate in $dep; do
              [ -f "$candidate" ] && matches+=("$candidate")
            done

            if [ "${#matches[@]}" -gt 0 ]; then
              printf '%s\n' "${matches[0]}"
              shopt -u nullglob
              return 0
            fi

            for candidate in \
              "/opt/homebrew/lib/$dep_name" \
              /opt/homebrew/opt/*/lib/"$dep_name" \
              "/usr/local/lib/$dep_name" \
              /usr/local/opt/*/lib/"$dep_name" \
              "/tmp/deps-x86/lib/$dep_name"
            do
              if [ -f "$candidate" ]; then
                printf '%s\n' "$candidate"
                shopt -u nullglob
                return 0
              fi
            done
            shopt -u nullglob

            return 1
          }

          bundle_macos_dylibs() {
            local app="$1"
            local binary="$app/Contents/MacOS/lite-anvil"
            local frameworks_dir="$app/Contents/Frameworks"
            local processed_list="$frameworks_dir/.bundled-dylibs"
            local queued_list="$frameworks_dir/.bundled-queue"

            mkdir -p "$frameworks_dir"
            : > "$processed_list"
            : > "$queued_list"

            bundle_macos_binary_deps() {
              local target="$1"
              local dep
              while IFS= read -r dep; do
                macos_should_bundle_dep "$dep" || continue
                bundle_macos_dep "$target" "$dep"
              done < <(macos_list_deps "$target")
            }

            bundle_macos_dep() {
              local target="$1"
              local source_dep="$2"
              local resolved_dep dep_name dest_dep

              resolved_dep="$(macos_resolve_dep "$source_dep")"
              dep_name="$(basename "$resolved_dep")"
              dest_dep="$frameworks_dir/$dep_name"

              install_name_tool -change "$source_dep" "@executable_path/../Frameworks/$dep_name" "$target"

              if ! grep -Fxq "$resolved_dep" "$processed_list"; then
                printf '%s\n' "$resolved_dep" >> "$processed_list"
                cp -Lf "$resolved_dep" "$dest_dep"
                chmod 755 "$dest_dep"
                install_name_tool -id "@loader_path/$dep_name" "$dest_dep"
                printf '%s\n' "$dest_dep" >> "$queued_list"
              fi
            }

            bundle_macos_binary_deps "$binary"

            local queue_index=1
            local queued_dep
            while queued_dep="$(sed -n "${queue_index}p" "$queued_list")" && [ -n "$queued_dep" ]; do
              local nested_dep nested_name resolved_nested_dep
              while IFS= read -r nested_dep; do
                macos_should_bundle_dep "$nested_dep" || continue
                resolved_nested_dep="$(macos_resolve_dep "$nested_dep")"
                nested_name="$(basename "$resolved_nested_dep")"

                install_name_tool -change "$nested_dep" "@loader_path/$nested_name" "$queued_dep"

                if ! grep -Fxq "$resolved_nested_dep" "$processed_list"; then
                  printf '%s\n' "$resolved_nested_dep" >> "$processed_list"
                  cp -Lf "$resolved_nested_dep" "$frameworks_dir/$nested_name"
                  chmod 755 "$frameworks_dir/$nested_name"
                  install_name_tool -id "@loader_path/$nested_name" "$frameworks_dir/$nested_name"
                  printf '%s\n' "$frameworks_dir/$nested_name" >> "$queued_list"
                fi
              done < <(macos_list_deps "$queued_dep")
              queue_index=$((queue_index + 1))
            done

            rm -f "$processed_list" "$queued_list"
          }

          # Ensure RPATHs for .app bundle layout.
          install_name_tool -add_rpath @executable_path/../Frameworks target/x86_64-apple-darwin/release/lite-anvil 2>/dev/null || true
          install_name_tool -add_rpath @executable_path target/x86_64-apple-darwin/release/lite-anvil 2>/dev/null || true

          rm -rf LiteAnvil.app
          mkdir -p LiteAnvil.app/Contents/MacOS LiteAnvil.app/Contents/Frameworks
          cp target/x86_64-apple-darwin/release/lite-anvil LiteAnvil.app/Contents/MacOS/
          cp -r data LiteAnvil.app/Contents/MacOS/
          bundle_macos_dylibs LiteAnvil.app
          sed "s/0\.19\.3/${APP_VERSION}/g" resources/macos/Info.plist > LiteAnvil.app/Contents/Info.plist
          otool -L LiteAnvil.app/Contents/MacOS/lite-anvil

          # Create NanoAnvil.app bundle
          install_name_tool -add_rpath @executable_path/../Frameworks target/x86_64-apple-darwin/release/nano-anvil 2>/dev/null || true
          install_name_tool -add_rpath @executable_path target/x86_64-apple-darwin/release/nano-anvil 2>/dev/null || true
          rm -rf NanoAnvil.app
          mkdir -p NanoAnvil.app/Contents/MacOS NanoAnvil.app/Contents/Frameworks
          cp target/x86_64-apple-darwin/release/nano-anvil NanoAnvil.app/Contents/MacOS/
          cp -r data NanoAnvil.app/Contents/MacOS/
          cp -R LiteAnvil.app/Contents/Frameworks/* NanoAnvil.app/Contents/Frameworks/ 2>/dev/null || true

          for dep in $(otool -L NanoAnvil.app/Contents/MacOS/nano-anvil | tail -n +2 | awk '{print $1}'); do
              case "$dep" in
                  /System/Library/*|/usr/lib/*|@executable_path/*|@loader_path/*) continue ;;
              esac
              dep_name="$(basename "$dep")"
              if [ -f "NanoAnvil.app/Contents/Frameworks/$dep_name" ]; then
                  install_name_tool -change "$dep" "@executable_path/../Frameworks/$dep_name" NanoAnvil.app/Contents/MacOS/nano-anvil
              fi
          done

          cat > NanoAnvil.app/Contents/Info.plist << 'NANOEOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleName</key><string>Nano Anvil</string>
              <key>CFBundleDisplayName</key><string>Nano Anvil</string>
              <key>CFBundleIdentifier</key><string>com.nano-anvil.NanoAnvil</string>
              <key>CFBundleVersion</key><string>VERSION_PLACEHOLDER</string>
              <key>CFBundleShortVersionString</key><string>VERSION_PLACEHOLDER</string>
              <key>CFBundleExecutable</key><string>nano-anvil</string>
              <key>CFBundlePackageType</key><string>APPL</string>
              <key>CFBundleInfoDictionaryVersion</key><string>6.0</string>
              <key>NSHighResolutionCapable</key><true/>
          </dict>
          </plist>
          NANOEOF
          sed -i '' "s/VERSION_PLACEHOLDER/${APP_VERSION}/g" NanoAnvil.app/Contents/Info.plist

          xattr -cr NanoAnvil.app 2>/dev/null || true
          codesign --force --deep --sign - --timestamp=none NanoAnvil.app
          otool -L NanoAnvil.app/Contents/MacOS/nano-anvil

          # Create NoteAnvil.app bundle.
          install_name_tool -add_rpath @executable_path/../Frameworks target/x86_64-apple-darwin/release/note-anvil 2>/dev/null || true
          install_name_tool -add_rpath @executable_path target/x86_64-apple-darwin/release/note-anvil 2>/dev/null || true
          rm -rf NoteAnvil.app
          mkdir -p NoteAnvil.app/Contents/MacOS NoteAnvil.app/Contents/Frameworks
          cp target/x86_64-apple-darwin/release/note-anvil NoteAnvil.app/Contents/MacOS/
          cp -r data NoteAnvil.app/Contents/MacOS/
          cp -R LiteAnvil.app/Contents/Frameworks/* NoteAnvil.app/Contents/Frameworks/ 2>/dev/null || true
          for dep in $(otool -L NoteAnvil.app/Contents/MacOS/note-anvil | tail -n +2 | awk '{print $1}'); do
              case "$dep" in
                  /System/Library/*|/usr/lib/*|@executable_path/*|@loader_path/*) continue ;;
              esac
              dep_name="$(basename "$dep")"
              if [ -f "NoteAnvil.app/Contents/Frameworks/$dep_name" ]; then
                  install_name_tool -change "$dep" "@executable_path/../Frameworks/$dep_name" NoteAnvil.app/Contents/MacOS/note-anvil
              fi
          done
          cat > NoteAnvil.app/Contents/Info.plist << 'NOTEEOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleName</key><string>Note Anvil</string>
              <key>CFBundleDisplayName</key><string>Note Anvil</string>
              <key>CFBundleIdentifier</key><string>com.note-anvil.NoteAnvil</string>
              <key>CFBundleVersion</key><string>VERSION_PLACEHOLDER</string>
              <key>CFBundleShortVersionString</key><string>VERSION_PLACEHOLDER</string>
              <key>CFBundleExecutable</key><string>note-anvil</string>
              <key>CFBundlePackageType</key><string>APPL</string>
              <key>CFBundleInfoDictionaryVersion</key><string>6.0</string>
              <key>NSHighResolutionCapable</key><true/>
          </dict>
          </plist>
          NOTEEOF
          sed -i '' "s/VERSION_PLACEHOLDER/${APP_VERSION}/g" NoteAnvil.app/Contents/Info.plist
          xattr -cr NoteAnvil.app 2>/dev/null || true
          codesign --force --deep --sign - --timestamp=none NoteAnvil.app

          cp scripts/install-mac.sh .
          zip -r "lite-anvil-${APP_VERSION}-macos-x86_64.zip" LiteAnvil.app NanoAnvil.app NoteAnvil.app install-mac.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: lite-anvil-macos-x86_64
          path: lite-anvil-*-macos-x86_64.zip

  build-macos-arm:
    name: macOS Apple Silicon (aarch64)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5

      - name: Read app version
        shell: bash
        run: |
          APP_VERSION="$(awk -F'"' '
            /^\[workspace\.package\]$/ { in_section = 1; next }
            /^\[/ { in_section = 0 }
            in_section && $1 ~ /^version = / { print $2; exit }
          ' Cargo.toml)"
          echo "APP_VERSION=$APP_VERSION" >> "$GITHUB_ENV"

      - name: Install system dependencies
        run: |
          # All C deps (SDL3 / freetype / pcre2) are now built from
          # vendored source by their -sys crates during `cargo build`
          # and statically linked. We only need `cmake` to drive SDL3's
          # source build (ninja is a nice-to-have for speed).
          brew install cmake ninja

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ github.job }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ github.job }}-

      - name: Build
        env:
          # Pin the deployment target so sdl3-sys's vendored C sources
          # (built by the `cc` crate) don't emit mach-o LC_BUILD_VERSION
          # records targeting the runner's current macOS SDK version
          # (e.g. 15.5). Without this, the linker emits "object file
          # was built for newer 'macOS' version than being linked"
          # warnings at link time and pulls in
          # `__isPlatformVersionAtLeast` — a symbol from
          # `libclang_rt.osx.a` that Rust's `-nodefaultlibs` drops —
          # causing "Undefined symbols for architecture arm64".
          MACOSX_DEPLOYMENT_TARGET: "12.0"
        run: |
          # Find `libclang_rt.osx.a` for the arm64 slice and link it
          # explicitly so any surviving `__isPlatformVersionAtLeast`
          # reference resolves. Matches what the Intel Mac job does.
          CLANG_RT=$(clang -arch arm64 -print-file-name=libclang_rt.osx.a)
          export RUSTFLAGS="-C link-arg=$CLANG_RT \
            -C link-arg=-framework -C link-arg=UniformTypeIdentifiers"
          cargo build --release --workspace --target aarch64-apple-darwin

      - name: Create .app bundle
        run: |
          set -euo pipefail

          macos_list_deps() {
            otool -L "$1" | tail -n +2 | awk '{print $1}'
          }

          macos_should_bundle_dep() {
            case "$1" in
              /System/Library/*|/usr/lib/*|@executable_path/*|@loader_path/*)
                return 1
                ;;
              /*|@rpath/*)
                return 0
                ;;
              *)
                return 1
                ;;
            esac
          }

          macos_resolve_dep() {
            local dep="$1"
            local dep_name candidate
            local matches=()

            if [ -f "$dep" ]; then
              printf '%s\n' "$dep"
              return 0
            fi

            dep_name="$(basename "$dep")"

            shopt -s nullglob
            for candidate in $dep; do
              [ -f "$candidate" ] && matches+=("$candidate")
            done

            if [ "${#matches[@]}" -gt 0 ]; then
              printf '%s\n' "${matches[0]}"
              shopt -u nullglob
              return 0
            fi

            for candidate in \
              "/opt/homebrew/lib/$dep_name" \
              /opt/homebrew/opt/*/lib/"$dep_name" \
              "/usr/local/lib/$dep_name" \
              /usr/local/opt/*/lib/"$dep_name"
            do
              if [ -f "$candidate" ]; then
                printf '%s\n' "$candidate"
                shopt -u nullglob
                return 0
              fi
            done
            shopt -u nullglob

            return 1
          }

          bundle_macos_dylibs() {
            local app="$1"
            local binary="$app/Contents/MacOS/lite-anvil"
            local frameworks_dir="$app/Contents/Frameworks"
            local processed_list="$frameworks_dir/.bundled-dylibs"
            local queued_list="$frameworks_dir/.bundled-queue"

            mkdir -p "$frameworks_dir"
            : > "$processed_list"
            : > "$queued_list"

            bundle_macos_binary_deps() {
              local target="$1"
              local dep
              while IFS= read -r dep; do
                macos_should_bundle_dep "$dep" || continue
                bundle_macos_dep "$target" "$dep"
              done < <(macos_list_deps "$target")
            }

            bundle_macos_dep() {
              local target="$1"
              local source_dep="$2"
              local resolved_dep dep_name dest_dep

              resolved_dep="$(macos_resolve_dep "$source_dep")"
              dep_name="$(basename "$resolved_dep")"
              dest_dep="$frameworks_dir/$dep_name"

              install_name_tool -change "$source_dep" "@executable_path/../Frameworks/$dep_name" "$target"

              if ! grep -Fxq "$resolved_dep" "$processed_list"; then
                printf '%s\n' "$resolved_dep" >> "$processed_list"
                cp -Lf "$resolved_dep" "$dest_dep"
                chmod 755 "$dest_dep"
                install_name_tool -id "@loader_path/$dep_name" "$dest_dep"
                printf '%s\n' "$dest_dep" >> "$queued_list"
              fi
            }

            bundle_macos_binary_deps "$binary"

            local queue_index=1
            local queued_dep
            while queued_dep="$(sed -n "${queue_index}p" "$queued_list")" && [ -n "$queued_dep" ]; do
              local nested_dep nested_name resolved_nested_dep
              while IFS= read -r nested_dep; do
                macos_should_bundle_dep "$nested_dep" || continue
                resolved_nested_dep="$(macos_resolve_dep "$nested_dep")"
                nested_name="$(basename "$resolved_nested_dep")"

                install_name_tool -change "$nested_dep" "@loader_path/$nested_name" "$queued_dep"

                if ! grep -Fxq "$resolved_nested_dep" "$processed_list"; then
                  printf '%s\n' "$resolved_nested_dep" >> "$processed_list"
                  cp -Lf "$resolved_nested_dep" "$frameworks_dir/$nested_name"
                  chmod 755 "$frameworks_dir/$nested_name"
                  install_name_tool -id "@loader_path/$nested_name" "$frameworks_dir/$nested_name"
                  printf '%s\n' "$frameworks_dir/$nested_name" >> "$queued_list"
                fi
              done < <(macos_list_deps "$queued_dep")
              queue_index=$((queue_index + 1))
            done

            rm -f "$processed_list" "$queued_list"
          }

          # Ensure RPATHs for .app bundle layout.
          install_name_tool -add_rpath @executable_path/../Frameworks target/aarch64-apple-darwin/release/lite-anvil 2>/dev/null || true
          install_name_tool -add_rpath @executable_path target/aarch64-apple-darwin/release/lite-anvil 2>/dev/null || true

          rm -rf LiteAnvil.app
          mkdir -p LiteAnvil.app/Contents/MacOS LiteAnvil.app/Contents/Frameworks
          cp target/aarch64-apple-darwin/release/lite-anvil LiteAnvil.app/Contents/MacOS/
          cp -r data LiteAnvil.app/Contents/MacOS/
          bundle_macos_dylibs LiteAnvil.app
          sed "s/0\.19\.3/${APP_VERSION}/g" resources/macos/Info.plist > LiteAnvil.app/Contents/Info.plist
          otool -L LiteAnvil.app/Contents/MacOS/lite-anvil

          # Create NanoAnvil.app bundle
          install_name_tool -add_rpath @executable_path/../Frameworks target/aarch64-apple-darwin/release/nano-anvil 2>/dev/null || true
          install_name_tool -add_rpath @executable_path target/aarch64-apple-darwin/release/nano-anvil 2>/dev/null || true
          rm -rf NanoAnvil.app
          mkdir -p NanoAnvil.app/Contents/MacOS NanoAnvil.app/Contents/Frameworks
          cp target/aarch64-apple-darwin/release/nano-anvil NanoAnvil.app/Contents/MacOS/
          cp -r data NanoAnvil.app/Contents/MacOS/
          cp -R LiteAnvil.app/Contents/Frameworks/* NanoAnvil.app/Contents/Frameworks/ 2>/dev/null || true

          for dep in $(otool -L NanoAnvil.app/Contents/MacOS/nano-anvil | tail -n +2 | awk '{print $1}'); do
              case "$dep" in
                  /System/Library/*|/usr/lib/*|@executable_path/*|@loader_path/*) continue ;;
              esac
              dep_name="$(basename "$dep")"
              if [ -f "NanoAnvil.app/Contents/Frameworks/$dep_name" ]; then
                  install_name_tool -change "$dep" "@executable_path/../Frameworks/$dep_name" NanoAnvil.app/Contents/MacOS/nano-anvil
              fi
          done

          cat > NanoAnvil.app/Contents/Info.plist << 'NANOEOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleName</key><string>Nano Anvil</string>
              <key>CFBundleDisplayName</key><string>Nano Anvil</string>
              <key>CFBundleIdentifier</key><string>com.nano-anvil.NanoAnvil</string>
              <key>CFBundleVersion</key><string>VERSION_PLACEHOLDER</string>
              <key>CFBundleShortVersionString</key><string>VERSION_PLACEHOLDER</string>
              <key>CFBundleExecutable</key><string>nano-anvil</string>
              <key>CFBundlePackageType</key><string>APPL</string>
              <key>CFBundleInfoDictionaryVersion</key><string>6.0</string>
              <key>NSHighResolutionCapable</key><true/>
          </dict>
          </plist>
          NANOEOF
          sed -i '' "s/VERSION_PLACEHOLDER/${APP_VERSION}/g" NanoAnvil.app/Contents/Info.plist

          xattr -cr NanoAnvil.app 2>/dev/null || true
          codesign --force --deep --sign - --timestamp=none NanoAnvil.app
          otool -L NanoAnvil.app/Contents/MacOS/nano-anvil

          # Create NoteAnvil.app bundle.
          install_name_tool -add_rpath @executable_path/../Frameworks target/aarch64-apple-darwin/release/note-anvil 2>/dev/null || true
          install_name_tool -add_rpath @executable_path target/aarch64-apple-darwin/release/note-anvil 2>/dev/null || true
          rm -rf NoteAnvil.app
          mkdir -p NoteAnvil.app/Contents/MacOS NoteAnvil.app/Contents/Frameworks
          cp target/aarch64-apple-darwin/release/note-anvil NoteAnvil.app/Contents/MacOS/
          cp -r data NoteAnvil.app/Contents/MacOS/
          cp -R LiteAnvil.app/Contents/Frameworks/* NoteAnvil.app/Contents/Frameworks/ 2>/dev/null || true
          for dep in $(otool -L NoteAnvil.app/Contents/MacOS/note-anvil | tail -n +2 | awk '{print $1}'); do
              case "$dep" in
                  /System/Library/*|/usr/lib/*|@executable_path/*|@loader_path/*) continue ;;
              esac
              dep_name="$(basename "$dep")"
              if [ -f "NoteAnvil.app/Contents/Frameworks/$dep_name" ]; then
                  install_name_tool -change "$dep" "@executable_path/../Frameworks/$dep_name" NoteAnvil.app/Contents/MacOS/note-anvil
              fi
          done
          cat > NoteAnvil.app/Contents/Info.plist << 'NOTEEOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleName</key><string>Note Anvil</string>
              <key>CFBundleDisplayName</key><string>Note Anvil</string>
              <key>CFBundleIdentifier</key><string>com.note-anvil.NoteAnvil</string>
              <key>CFBundleVersion</key><string>VERSION_PLACEHOLDER</string>
              <key>CFBundleShortVersionString</key><string>VERSION_PLACEHOLDER</string>
              <key>CFBundleExecutable</key><string>note-anvil</string>
              <key>CFBundlePackageType</key><string>APPL</string>
              <key>CFBundleInfoDictionaryVersion</key><string>6.0</string>
              <key>NSHighResolutionCapable</key><true/>
          </dict>
          </plist>
          NOTEEOF
          sed -i '' "s/VERSION_PLACEHOLDER/${APP_VERSION}/g" NoteAnvil.app/Contents/Info.plist
          xattr -cr NoteAnvil.app 2>/dev/null || true
          codesign --force --deep --sign - --timestamp=none NoteAnvil.app

          cp scripts/install-mac.sh .
          zip -r "lite-anvil-${APP_VERSION}-macos-aarch64.zip" LiteAnvil.app NanoAnvil.app NoteAnvil.app install-mac.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: lite-anvil-macos-aarch64
          path: lite-anvil-*-macos-aarch64.zip

  release:
    name: Create Release
    needs: [build-linux, build-windows, build-macos-intel, build-macos-arm]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v6
        with:
          path: artifacts/

      - name: Collect release files
        run: |
          find artifacts -mindepth 2 -maxdepth 2 -type f \
            \( -name '*.tar.gz' -o -name '*.zip' -o -name '*.deb' \
               -o -name '*.rpm' -o -name '*.AppImage' -o -name '*.exe' \) \
            -exec mv {} artifacts/ \;

      - uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          files: |
            artifacts/*.tar.gz
            artifacts/*.zip
            artifacts/*.deb
            artifacts/*.rpm
            artifacts/*.AppImage
            artifacts/*.exe
